name: Deploy Staging

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render staging deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_STAGING_DEPLOY_HOOK_URL is not configured." >&2
            exit 1
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"

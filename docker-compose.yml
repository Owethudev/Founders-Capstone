version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: founders-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/founders-capstone
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: founders-worker
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/founders-capstone
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: node worker.js

  mongo:
    image: mongo:7
    container_name: founders-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: founders-redis
    ports:
      - "6379:6379"

volumes:
  mongo-data:
